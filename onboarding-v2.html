<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketplace Onboarding — Prototype</title>
<style>
  :root{
    --green:#12b886; --green-d:#0b8a64; --indigo:#3b34b8; --navy:#1f2a5a;
    --ink:#2b3242; --muted:#6b7280; --line:#e4e7ee; --bg:#eef1f6; --card:#fff;
    --new:#c0392b; --new-bg:#fbe9e7; --ren:#b06a00; --ren-bg:#fcefd6; --par:#1d6fb8; --par-bg:#e6f1fb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--green-d);font-size:18px}
  .brand .dots{display:grid;grid-template-columns:repeat(3,5px);grid-gap:2px}
  .brand .dots i{width:5px;height:5px;border-radius:1px;background:var(--green);display:block}
  .brand small{color:var(--navy);font-weight:700}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
  .wrap{max-width:880px;margin:28px auto;padding:0 20px 80px}
  .hero{text-align:center;margin-bottom:18px}
  .hero h1{color:var(--indigo);font-size:26px;margin:0 0 6px}
  .hero p{color:var(--muted);margin:0;font-size:14px}
  .legend{display:none;gap:14px;flex-wrap:wrap;justify-content:center;margin:10px 0 0;font-size:11.5px;color:var(--muted)}
  body.tags .legend{display:flex}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
  .stepper{display:flex;align-items:center;justify-content:space-between;max-width:760px;margin:22px auto 6px;padding:0 8px}
  .stepper .node{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .stepper .bar{flex:1;height:2px;background:var(--line);margin:0 6px;position:relative;top:-9px}
  .stepper .dot{width:22px;height:22px;border-radius:50%;background:#cfd5e1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .stepper .node.active .dot{background:var(--green)}
  .stepper .node.done .dot{background:var(--green-d)}
  .stepper .lbl{font-size:12px;color:var(--muted);white-space:nowrap}
  .stepper .node.active .lbl{color:var(--green-d);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 30px;margin-top:14px}
  .card h2{font-size:20px;margin:0 0 2px;color:#111}
  .card .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .group{margin:18px 0 6px}
  .group.sec{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .group-title{font-size:14px;font-weight:700;color:#3a4a86;border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:14px}
  .group.sec .group-title{border-color:#e0e5ee}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px}
  .f{display:flex;flex-direction:column;gap:5px}
  .f.full{grid-column:1 / -1}
  .f label{font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .req{color:var(--new)} .opt{color:var(--muted);font-weight:400;font-size:12px}
  input[type=text],input[type=email],input[type=tel],input[type=number],input[type=date],select,textarea{
    width:100%;padding:9px 11px;border:1px solid #d6dae3;border-radius:8px;font-size:14px;background:#fff;font-family:inherit;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(18,184,134,.15)}
  textarea{min-height:74px;resize:vertical}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:7px 16px}
  .checks.one{grid-template-columns:1fr}
  .chk,.rad{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#374151;cursor:pointer;font-weight:400}
  .chk input,.rad input{margin-top:2px;accent-color:var(--green)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .note{background:#f6f8fb;border:1px solid var(--line);border-left:3px solid #cfd5e1;border-radius:0 8px 8px 0;padding:10px 12px;font-size:12.5px;color:var(--muted);margin:8px 0}
  .tag{display:none;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
  body.tags .tag{display:inline-block}
  .tag.NEW{color:var(--new);background:var(--new-bg)} .tag.RENAME,.tag.RESTRUCTURE{color:var(--ren);background:var(--ren-bg)} .tag.PARITY{color:var(--par);background:var(--par-bg)}
  .combo{position:relative}
  .combo-ctl{display:flex;align-items:center;justify-content:space-between;border:1px solid #d6dae3;border-radius:8px;padding:9px 11px;font-size:14px;background:#fff;cursor:pointer}
  .combo.open .combo-ctl{border-color:var(--green);box-shadow:0 0 0 3px rgba(18,184,134,.15)}
  .combo-sum{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:92%;color:var(--ink)}
  .combo-sum.ph{color:#9aa1ad}
  .cvch{color:#9aa1ad;font-size:13px}
  .combo-pan{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #d6dae3;border-radius:8px;box-shadow:0 8px 24px rgba(20,30,60,.14);z-index:40;padding:6px}
  .combo.open .combo-pan{display:block}
  .combo-srch{width:100%;padding:7px 9px;border:1px solid #e1e4ea;border-radius:6px;font-size:13px;margin-bottom:4px}
  .combo-list{max-height:240px;overflow:auto}
  .cg{font-size:11px;font-weight:700;color:#8a93a3;text-transform:uppercase;letter-spacing:.03em;padding:8px 8px 3px}
  .combo-opt{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;font-size:13px;cursor:pointer;color:#374151}
  .combo-opt:hover{background:#f4f6f9}
  .combo-opt .ck{margin-left:auto;color:var(--green);opacity:0;font-weight:800}
  .combo-opt.sel{background:#e9f9f2;color:var(--green-d)}
  .combo-opt.sel .ck{opacity:1}
  .combo-foot{display:none;border-top:1px solid #eef0f4;margin-top:4px;padding-top:6px}
  .combo.has-sel .combo-foot{display:block}
  .combo-clear{display:block;width:100%;text-align:center;background:none;border:none;color:var(--green-d);font-size:12px;font-weight:600;cursor:pointer;padding:8px 12px;font-family:inherit;border-radius:6px;transition:background .12s}
  .combo-clear:hover{background:#e9f9f2}
  .cefr-row{display:grid;grid-template-columns:1fr 1fr 32px;gap:10px;margin-bottom:8px;align-items:center}
  .cefr-pad{width:32px}
  .cefr-del{width:30px;height:30px;border:1px solid #e1c4c4;background:#fff;color:#c0392b;border-radius:6px;cursor:pointer;font-size:16px;line-height:1}
  .cefr-del:hover{background:#fbe9e7}
  .cefr-add{margin-top:2px;background:none;border:none;color:var(--green-d);font-size:13px;font-weight:600;cursor:pointer;padding:6px 8px;border-radius:6px;font-family:inherit}
  .cefr-add:hover{background:#e9f9f2}
  .dropzone{border:1px dashed #cfd6e0;border-radius:10px;padding:26px 20px;text-align:center;background:#fff}
  .dropzone .ic{width:40px;height:40px;border:1px solid #e1e4ea;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#6b7280;margin-bottom:10px}
  .dropzone .up{font-size:13px;color:#4b5563}
  .dropzone .up b{color:var(--green-d);cursor:pointer}
  .dropzone .sz{font-size:12px;color:#9aa1ad;margin-top:4px}
  .rate{display:flex;flex-wrap:wrap;gap:6px}
  .rate .pill{border:1px solid #d6dae3;border-radius:8px;padding:6px 10px;font-size:12px;color:#4b5563;cursor:pointer;text-align:center;min-width:80px;background:#fff}
  .rate .pill b{display:block;font-size:13px;color:#111}
  .rate .pill.sel{border-color:var(--green);background:#e9f9f2;color:var(--green-d)}
  .rrow{display:grid;grid-template-columns:200px 1fr;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #f0f2f6}
  .rrow .rl{font-size:13px;font-weight:600;color:#374151}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
  .btn{border:none;border-radius:9px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.next{background:var(--green);color:#fff} .btn.next:hover{background:var(--green-d)}
  .btn.back{background:#fff;border:1px solid #d6dae3;color:#374151}
  @media(max-width:640px){.fields,.checks{grid-template-columns:1fr}.rrow{grid-template-columns:1fr}}
</style>

<div class="topbar">
  <div class="brand"><span class="dots"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span> Agents&nbsp;Only <small>· Marketplace</small></div>
  <label class="toggle"><input type="checkbox" id="tagToggle"> Show build tags (NEW / RENAME)</label>
</div>

<div class="wrap">
  <div class="hero">
    <h1>Kick Off Your Next Gig With Us</h1>
    <p>Looking to take on projects in customer service or data labeling? Sign up below and we'll be in touch when the right gigs come up.</p>
    <div class="legend">
      <span><i class="sw" style="background:var(--new-bg);border:1px solid var(--new)"></i>NEW field</span>
      <span><i class="sw" style="background:var(--ren-bg);border:1px solid var(--ren)"></i>RENAME / restructure</span>
      <span><i class="sw" style="background:var(--par-bg);border:1px solid var(--par)"></i>PARITY (also in Agent Portal)</span>
    </div>
  </div>
  <div class="stepper" id="stepper"></div>
  <div class="card" id="card"></div>
  <div class="nav">
    <button class="btn back" id="backBtn" onclick="go(-1)">Back</button>
    <button class="btn next" id="nextBtn" onclick="go(1)">Next</button>
  </div>
</div>

 { name:"Skills", groups:[

     {l:"Languages you are fluent in speaking",t:"combo",r:1,full:1,ph:"Select speaking languages",o:["English","Spanish","French","Mandarin","Arabic","Hindi","Portuguese","German","Tagalog","Other (Please specify)"]},
     {l:"Specify other speaking languages",t:"specify",full:1},
     {l:"Languages you are fluent in writing",t:"combo",r:1,full:1,ph:"Select writing languages",o:["English","Spanish","French","Mandarin","Arabic","Hindi","Portuguese","German","Tagalog","Other (Please specify)"]},
     {l:"Specify other writing languages",t:"specify",full:1},
     {l:"Native language(s)",t:"text",r:1,tag:"NEW",full:1,ph:"Your mother tongue(s)"},
     {l:"Language proficiency (CEFR levels)",t:"cefr",r:1,tag:"NEW",full:1} ]},
   {title:"Expertise & certifications", fields:[
     {l:"Industry experience",t:"combo",r:1,full:1,ph:"Select industries",o:["Technology & Software","Travel & Hospitality","Finance","Healthcare","Retail / E-commerce","Education","Other (Please specify)"]},
     {l:"Specify other industries",t:"specify",full:1},
     {l:"Subject matter expertise",t:"combo",r:1,full:1,ph:"Select expertise",o:["Translation & Localization","UX/UI Design","Data Analysis","Customer Support","Software Engineering","Other (Please specify)"]},
     {l:"Specify other expertise",t:"specify",full:1},
     {l:"Additional certifications / licenses / training",t:"textarea",r:0,tag:"NEW",full:1,ph:"e.g. HIPAA, Medical Certifications"} ]},
 ]},

 { name:"Skills Assessment", intro:"Last step — rate yourself on each skill from 1 to 5.", groups:[
   {title:"Quality (rate 1–5)", rate:["Poor","Fair","Good","Very Good","Excellent"], items:["Written English","Reading comprehension","Following guidelines","Attention to detail","Handling ambiguity"]},
   {title:"Speed (rate 1–5)", rate:["Very Slow","Slow","Average","Fast","Very Fast"], items:["Annotation speed"]},
   {title:"Proficiency (rate 1–5)", rate:["None","Basic","Intermediate","Advanced","Expert"], items:["Annotation tools","Coding / programming","LLM evaluation","Image annotation tools","Audio annotation tools"]},
 ]},
];

let cur = 0;

function optRow(x,tg){return `<div class="combo-opt" data-l="${x.toLowerCase().replace(/"/g,'')}" onclick="toggleOpt(this)"><span class="ol">${x}</span>${T(tg)}<i class="ck">✓</i></div>`;}
function comboHTML(f){
  let list="";
  if(f.tasks){ list = TASKS.map(([g,items])=>`<div class="cg">${g}</div>`+items.map(([x,tg])=>optRow(x,tg)).join("")).join("") + optRow("Other (please specify)",""); }
  else { list = f.o.map(x=>optRow(x,"")).join(""); }
  const ph = f.ph||"Select…";
  return `<div class="combo" data-ph="${ph}">
    <div class="combo-ctl" onclick="toggleCombo(this)"><span class="combo-sum ph">${ph}</span><i class="cvch">▾</i></div>
    <div class="combo-pan"><input class="combo-srch" placeholder="Search…" oninput="filterCombo(this)"><div class="combo-list">${list}</div><div class="combo-foot"><button type="button" class="combo-clear" onclick="clearCombo(this)">Clear all</button></div></div>
  </div>`;
}
function fieldHTML(f){
  const lab = `<label>${f.l} ${f.nb?'':reqMark(f.r)} ${T(f.tag)}</label>`;
  let body="";
  if(["text","email","tel","number","date"].includes(f.t)){ body = `<input type="${f.t}" placeholder="${f.ph||''}"${f.iw?` style="max-width:${f.iw}"`:''}>`; }
  else if(f.t==="select"){ const on=f.gate?` onchange="toggleGate('${f.gate}',this.value)"`:""; body = `<select${on}${f.iw?` style="max-width:${f.iw}"`:''}><option value="" disabled selected>${f.ph||'Select…'}</option>${f.o.map(x=>`<option>${x}</option>`).join("")}</select>`; }
  else if(f.t==="textarea"){ body = `<textarea placeholder="${f.ph||''}"></textarea>`; }
  else if(f.t==="file"){ body = `<input type="text" placeholder="Click to upload (PDF, PNG, JPG)" readonly style="cursor:pointer;background:#fafbfc">`; }
  else if(f.t==="upload"){ return `<div class="f full"><label>${f.l} ${reqMark(f.r)} ${T(f.tag)}</label><div class="dropzone"><span class="ic">${UPLOAD_SVG}</span><div class="up"><b>Click to upload</b> or drag and drop</div><div class="sz">${f.note||''}</div></div></div>`; }
  else if(f.t==="checks"){ body = `<div class="checks">${f.o.map(x=>`<label class="chk"><input type="checkbox"> ${x}</label>`).join("")}</div>`; }
  else if(f.t==="radios"){ const nm="r"+Math.random().toString(36).slice(2,7); body = `<div class="checks one">${f.o.map(x=>`<label class="rad"><input type="radio" name="${nm}"> ${x}</label>`).join("")}</div>`; }
  else if(f.t==="single"){ return `<div class="f full"><label class="chk" style="font-size:13px;font-weight:400"><input type="checkbox"> ${f.l} ${T(f.tag)}</label></div>`; }
  else if(f.t==="specify"){ return `<div class="f full other-spec" style="display:none"><label>${f.l}</label><input type="text" placeholder="${f.ph||'Please specify'}"></div>`; }
  else if(f.t==="combo"){ body = comboHTML(f); }
  else if(f.t==="cefr"){
    body = `<div class="cefr"><div class="cefr-rows">${cefrRowHTML(false)}</div><button type="button" class="cefr-add" onclick="addCefr(this)">+ Add another language</button></div>`;
  }
  return `<div class="f ${f.full?'full':''}">${lab}${body}</div>`;
}
function rateHTML(scale,item){return `<div class="rrow"><div class="rl">${item}</div><div class="rate">${scale.map((s,i)=>`<div class="pill" onclick="pick(this)"><b>${i+1}</b>${s}</div>`).join("")}</div></div>`;}

function groupHTML(g){
  if(g.note) return `<div class="note">${g.note}</div>`;
  let h = `<div class="group ${g.sec?'sec':''}">`;
  if(g.title) h += `<div class="group-title">${g.title}</div>`;
  if(g.rate){ h += g.items.map(it=>rateHTML(g.rate,it)).join(""); }
  else { h += `<div class="fields">${g.fields.map(f=>fieldHTML(g.reqAll&&f.t!=='specify'?Object.assign({},f,{r:1}):f)).join("")}</div>`; if(g.hint) h += `<div class="hint">${g.hint}</div>`; }
  h += `</div>`;
  if(g.cond) return `<div class="gate g-${g.cond}" style="display:none">${h}</div>`;
  return h;
}

function render(){
  document.getElementById("stepper").innerHTML = STEPS.map((s,i)=>{
    const cls = i===cur?"active":(i<cur?"done":"");
    return `<div class="node ${cls}" onclick="jump(${i})"><div class="dot">${i<cur?'✓':i+1}</div><div class="lbl">${s.name}</div></div>`;
  }).join('<div class="bar"></div>');

  const s = STEPS[cur];
  let html = `<h2>${s.name}</h2>`;
  html += `<p class="sub">${s.intro || "Fields are grouped to keep the form easy to scan."}</p>`;
  html += s.groups.map(groupHTML).join("");
  document.getElementById("card").innerHTML = html;

  document.getElementById("backBtn").style.visibility = cur===0?"hidden":"visible";
  document.getElementById("nextBtn").textContent = (cur===STEPS.length-1) ? "Submit" : "Next";
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(d){ cur = Math.max(0, Math.min(STEPS.length-1, cur+d)); render(); }
function jump(i){ cur=i; render(); }
function pick(el){ el.parentNode.querySelectorAll('.pill').forEach(p=>p.classList.remove('sel')); el.classList.add('sel'); }
function toggleGate(name,val){ const hide = !val || /^none/i.test(val) || /^no experience/i.test(val); document.querySelectorAll('.g-'+name).forEach(b=>b.style.display=hide?'none':''); }
function toggleCombo(ctl){ const c=ctl.closest('.combo'); document.querySelectorAll('.combo.open').forEach(x=>{if(x!==c)x.classList.remove('open');}); c.classList.toggle('open'); }
function toggleOpt(o){ o.classList.toggle('sel'); const c=o.closest('.combo'); syncCombo(c); updateOther(c); }
function syncCombo(c){ const sels=[...c.querySelectorAll('.combo-opt.sel .ol')].map(s=>s.textContent.trim()); const sum=c.querySelector('.combo-sum'); if(sels.length){ sum.textContent=sels.join(', '); sum.classList.remove('ph'); } else { sum.textContent=c.dataset.ph; sum.classList.add('ph'); } c.classList.toggle('has-sel', sels.length>0); }
function clearCombo(btn){ const c=btn.closest('.combo'); c.querySelectorAll('.combo-opt.sel').forEach(o=>o.classList.remove('sel')); syncCombo(c); updateOther(c); }
function updateOther(c){ const hasOther=[...c.querySelectorAll('.combo-opt.sel .ol')].some(s=>/^other/i.test(s.textContent.trim())); const fdiv=c.closest('.f'); const spec=fdiv?fdiv.nextElementSibling:null; if(spec&&spec.classList.contains('other-spec')) spec.style.display=hasOther?'':'none'; }
function filterCombo(inp){ const q=inp.value.toLowerCase(); const list=inp.nextElementSibling; list.querySelectorAll('.combo-opt').forEach(o=>{o.style.display=o.dataset.l.includes(q)?'':'none';}); list.querySelectorAll('.cg').forEach(g=>{let n=g.nextElementSibling,vis=false; while(n&&!n.classList.contains('cg')){ if(n.classList.contains('combo-opt')&&n.style.display!=='none'){vis=true;break;} n=n.nextElementSibling; } g.style.display=vis?'':'none';}); }
document.addEventListener('click',e=>{ if(!e.target.closest('.combo')) document.querySelectorAll('.combo.open').forEach(c=>c.classList.remove('open')); });
document.getElementById('tagToggle').addEventListener('change',function(){ document.body.classList.toggle('tags',this.checked); });
render();
</script>
